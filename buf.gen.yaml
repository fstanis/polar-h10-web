version: v2
clean: true
inputs:
  - directory: proto
    # descriptor.proto is only a compile input for nanopb.proto; the generated
    # nanopb codec imports the descriptor from @bufbuild/protobuf/wkt instead.
    exclude_paths:
      - proto/google/protobuf/descriptor.proto
plugins:
  - local: ./node_modules/.bin/protoc-gen-es
    out: src/proto/gen
    opt:
      - target=ts
      - import_extension=js
